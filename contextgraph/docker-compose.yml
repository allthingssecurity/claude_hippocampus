# Context Graph: Isolated Neo4j + Graphiti for agent decision tracing
# Separate from any existing Neo4j instances (different ports, network, volumes)

services:
  neo4j-traces:
    image: neo4j:5.26-community
    container_name: contextgraph-neo4j
    ports:
      - "7475:7474"   # Browser UI (offset from default 7474)
      - "7688:7687"   # Bolt protocol (offset from default 7687)
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-tracegraph2026}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - contextgraph_neo4j_data:/data
      - contextgraph_neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-tracegraph2026}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  graphiti-mcp:
    image: zepai/graphiti:latest
    container_name: contextgraph-mcp
    ports:
      - "8100:8000"   # Graphiti REST API (MCP bridge connects here)
    environment:
      # Neo4j connection (container-to-container)
      NEO4J_URI: bolt://neo4j-traces:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-tracegraph2026}
      # LLM for entity extraction (uses GRAPHITI_OPENAI_KEY to avoid shell override)
      OPENAI_API_KEY: ${GRAPHITI_OPENAI_KEY}
      # Graphiti config
      GRAPHITI_GROUP_ID: ${GRAPHITI_GROUP_ID:-claude-traces}
      GRAPHITI_TELEMETRY_ENABLED: "false"
      SEMAPHORE_LIMIT: "5"
    depends_on:
      neo4j-traces:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  contextgraph_neo4j_data:
  contextgraph_neo4j_logs:

networks:
  default:
    name: contextgraph
    driver: bridge
